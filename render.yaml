services:
  - type: web
    name: truthlens-api
    runtime: python
    rootDir: Backend
    buildCommand: apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-eng && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
